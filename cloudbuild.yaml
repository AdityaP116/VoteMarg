steps:
  # Install dependencies & Run tests
  - name: 'node:22-alpine'
    entrypoint: npm
    args: ['ci']

  - name: 'node:22-alpine'
    entrypoint: npm
    args: ['run', 'test']

  # Build the container image using secrets
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          -t gcr.io/$PROJECT_ID/votemarg:$COMMIT_SHA \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$FIREBASE_API_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN \
          --build-arg NEXT_PUBLIC_FIREBASE_DATABASE_URL=$_FIREBASE_DATABASE_URL \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=$_FIREBASE_APP_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=$_FIREBASE_MEASUREMENT_ID \
          .
    secretEnv: ['FIREBASE_API_KEY']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/votemarg:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'votemarg'
      - '--image'
      - 'gcr.io/$PROJECT_ID/votemarg:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--startup-cpu-boost'
      - '--timeout'
      - '300'

timeout: '1200s'

substitutions:
  _FIREBASE_PROJECT_ID: 'parkflow-aea27'
  _FIREBASE_AUTH_DOMAIN: 'parkflow-aea27.firebaseapp.com'
  _FIREBASE_DATABASE_URL: 'https://parkflow-aea27-default-rtdb.firebaseio.com'
  _FIREBASE_STORAGE_BUCKET: 'parkflow-aea27.firebasestorage.app'
  _FIREBASE_MESSAGING_SENDER_ID: '780295868152'
  _FIREBASE_APP_ID: '1:780295868152:web:84c2785df4df3d417eb50d'
  _FIREBASE_MEASUREMENT_ID: 'G-1063MH4QXY'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_API_KEY/versions/latest
      env: 'FIREBASE_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/votemarg:$COMMIT_SHA'
